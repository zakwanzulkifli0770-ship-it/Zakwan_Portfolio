services:
  - type: web
    name: muhd-zakwan-portfolio
    runtime: node
    buildCommand: bash render-build.sh
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_PATH
        value: /
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: portfolio-db
    databaseName: portfolio
    user: portfolio_user
    plan: free
